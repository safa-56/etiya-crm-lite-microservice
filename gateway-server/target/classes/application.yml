spring:
  application:
    # Config server, konfigürasyonu bu isme göre çözer: configs/gateway-server/
    name: gateway-server
  profiles:
    # Dışarıdan SPRING_PROFILES_ACTIVE verilmezse geliştirme profili aktif olur.
    # Docker imajı bu değişkeni 'docker' olarak set eder (bkz. Dockerfile).
    active: ${SPRING_PROFILES_ACTIVE:dev}
  config:
    # Merkezi konfigürasyon importu. 'optional:' öneki, config server erişilemezse
    # uygulamanın yereldeki ayarlarla açılmasına izin verir (dayanıklılık).
    # Adres CONFIG_SERVER_URL ile override edilir (docker/prod ortamları için).
    import: optional:configserver:${CONFIG_SERVER_URL:http://localhost:8888}
