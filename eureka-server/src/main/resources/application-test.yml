# =============================================================================
# test profili - otomatik testler (CI / mvn test)
# Rastgele port ile context yüklemesini izole eder; port çakışması olmaz.
# =============================================================================
server:
  # 0 => işletim sistemi boş bir port atar; paralel testlerde çakışmayı önler.
  port: 0

eureka:
  client:
    # Test sırasında ağ trafiği / registry replikasyonu istemiyoruz.
    register-with-eureka: false
    fetch-registry: false
    service-url:
      defaultZone: http://localhost:8761/eureka/

logging:
  level:
    com.netflix.eureka: WARN
    com.netflix.discovery: WARN
