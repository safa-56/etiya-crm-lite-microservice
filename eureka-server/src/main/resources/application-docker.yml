# =============================================================================
# docker profili - konteyner / docker-compose ortamı
# Servisler compose ağı içinde 'eureka-server' host adıyla haberleşir.
# =============================================================================
eureka:
  instance:
    # Compose ağındaki diğer servislerin çözebileceği sabit host adı.
    hostname: eureka-server
  client:
    service-url:
      defaultZone: http://eureka-server:${server.port}/eureka/
