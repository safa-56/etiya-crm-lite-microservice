<div class="flex min-h-dvh flex-col lg:flex-row">
  <app-login-brand-panel />

  <!-- Sağ panel: giriş formu -->
  <section class="relative flex flex-1 flex-col bg-white px-6 py-8">
    <div class="flex justify-end">
      <app-language-switcher />
    </div>

    <div class="flex flex-1 items-center justify-center">
      <div class="w-full max-w-md">
        <div class="flex flex-col items-center">
          <img
            ngSrc="etiya-logo-2.png"
            alt="Etiya"
            width="910"
            height="223"
            priority
            class="h-auto w-[110px]"
          />
          <h1 class="mt-6 text-xl font-bold text-etiya-navy">{{ t().login.title }}</h1>
        </div>

        <form
          [formGroup]="form"
          (ngSubmit)="submit()"
          class="mt-8 rounded-2xl border border-slate-100 bg-etiya-gray p-8 shadow-sm"
        >
          <app-form-field for="username" [label]="t().login.username">
            <app-input-group icon="user">
              <input
                id="username"
                type="text"
                formControlName="username"
                autocomplete="username"
                class="field-control pl-10"
                [placeholder]="t().login.usernamePlaceholder"
              />
            </app-input-group>
          </app-form-field>

          <app-form-field class="mt-5" for="password" [label]="t().login.password">
            <app-input-group icon="lock">
              <input
                id="password"
                [type]="passwordFieldType()"
                formControlName="password"
                autocomplete="current-password"
                (blur)="hidePassword()"
                class="field-control pr-11 pl-10"
                [placeholder]="t().login.passwordPlaceholder"
              />

              <button
                trailing
                type="button"
                (mousedown)="$event.preventDefault()"
                (click)="togglePasswordVisibility()"
                [attr.aria-label]="
                  passwordVisible() ? t().login.hidePassword : t().login.showPassword
                "
                [attr.aria-pressed]="passwordVisible()"
                class="absolute inset-y-0 right-0 flex items-center pr-3 text-slate-400 transition hover:text-etiya-navy focus:outline-none focus-visible:text-etiya-navy"
              >
                <app-icon [name]="passwordVisible() ? 'eye' : 'eye-off'" />
              </button>
            </app-input-group>
          </app-form-field>

          <div class="mt-8">
            <app-button type="submit" size="xl" [full]="true" [disabled]="form.invalid">
              {{ t().login.submit }}
              <app-icon name="arrow-right" [stroke]="1.8" />
            </app-button>
          </div>
        </form>

        <p class="mt-6 text-center text-xs text-slate-400">{{ t().login.support }}</p>
      </div>
    </div>
  </section>
</div>
