<div class="flex flex-col gap-6 lg:flex-row">
  <section class="w-full shrink-0 lg:w-80">
    <app-customer-search-filters (search)="onSearch($event)" />
  </section>

  <section class="min-w-0 flex-1">
    @if (loading()) {
      <app-empty-state size="lg" icon="search" [message]="t().customers.results.loading" />
    } @else if (errorMessage(); as message) {
      <app-empty-state size="lg" icon="alert" [message]="message" />
    } @else if (result(); as data) {
      @if (data.rows.length > 0) {
        <app-customer-results-table [result]="data" (pageChange)="onPageChange($event)" />
      } @else {
        <app-empty-state size="lg" icon="search" [message]="t().customers.results.noMatch" />
      }
    }
  </section>
</div>
