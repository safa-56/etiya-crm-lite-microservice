<div class="flex flex-col gap-6 lg:flex-row">
  <section class="w-full shrink-0 lg:w-80">
    <app-customer-search-filters (search)="onSearch($event)" />
  </section>

  <section class="min-w-0 flex-1">
    @if (results().length > 0) {
      <app-customer-results-table [customers]="results()" />
    } @else {
      <app-empty-state size="lg" icon="search" [message]="t().customers.results.noMatch" />
    }
  </section>
</div>
