<div class="flex flex-col gap-5">
  <!-- Sayfa yolu -->
  <nav [attr.aria-label]="t().customers.create.breadcrumb">
    <ol class="flex flex-wrap items-center gap-2 text-sm">
      <li>
        <a
          routerLink="/customers"
          class="font-semibold text-etiya-orange transition hover:text-etiya-orange-dark hover:underline focus:outline-none focus-visible:ring-2 focus-visible:ring-etiya-orange focus-visible:ring-offset-2"
        >
          {{ t().nav.customerSearch }}
        </a>
      </li>
      <li aria-hidden="true" class="text-slate-300">
        <svg class="h-4 w-4" viewBox="0 0 24 24" fill="none">
          <path
            d="m9 6 6 6-6 6"
            stroke="currentColor"
            stroke-width="1.8"
            stroke-linecap="round"
            stroke-linejoin="round"
          />
        </svg>
      </li>
      <li aria-current="page" class="text-slate-500">{{ t().nav.customerCreate }}</li>
    </ol>
  </nav>

  <!-- Adım göstergesi -->
  <section class="rounded-2xl border border-slate-200 bg-white px-6 py-5 shadow-sm">
    <ol class="flex flex-wrap items-center gap-4">
      @for (step of steps(); track step.index; let last = $last) {
        <li
          class="flex items-center gap-3"
          [class.flex-1]="!last"
          [attr.aria-current]="activeStep() === step.index ? 'step' : null"
        >
          <span
            aria-hidden="true"
            class="flex h-8 w-8 shrink-0 items-center justify-center rounded-full text-sm font-semibold"
            [class]="
              activeStep() === step.index
                ? 'bg-etiya-orange text-white'
                : 'bg-etiya-gray text-slate-400'
            "
          >
            {{ step.index }}
          </span>
          <span
            class="text-sm whitespace-nowrap"
            [class]="
              activeStep() === step.index
                ? 'font-bold text-etiya-navy'
                : 'font-medium text-slate-500'
            "
          >
            {{ step.label }}
          </span>
          @if (!last) {
            <span aria-hidden="true" class="ml-2 hidden h-px flex-1 bg-slate-200 sm:block"></span>
          }
        </li>
      }
    </ol>
  </section>

  <!-- Demografik bilgi formu -->
  <section class="rounded-2xl border border-slate-200 bg-white px-6 py-5 shadow-sm">
    <h2 class="border-b border-slate-100 pb-4 text-base font-bold text-etiya-orange">
      {{ t().customers.create.demographic.title }}
    </h2>

    <div class="mt-6 grid gap-x-8 gap-y-5 sm:grid-cols-2">
      <div>
        <label for="firstName" class="block text-sm font-medium text-etiya-navy">
          {{ t().customers.create.demographic.firstName }}
          <span aria-hidden="true" class="text-rose-500">*</span>
        </label>
        <input
          id="firstName"
          type="text"
          [formField]="customerForm.firstName"
          aria-required="true"
          [placeholder]="t().customers.create.startsWith"
          class="mt-2 w-full rounded-lg border border-slate-200 bg-white px-3 py-2.5 text-sm text-etiya-navy placeholder:text-slate-400 focus:border-etiya-orange focus:ring-2 focus:ring-etiya-orange/30 focus:outline-none"
        />
      </div>

      <div>
        <label for="secondName" class="block text-sm font-medium text-etiya-navy">
          {{ t().customers.create.demographic.secondName }}
        </label>
        <input
          id="secondName"
          type="text"
          [formField]="customerForm.secondName"
          class="mt-2 w-full rounded-lg border border-slate-200 bg-white px-3 py-2.5 text-sm text-etiya-navy placeholder:text-slate-400 focus:border-etiya-orange focus:ring-2 focus:ring-etiya-orange/30 focus:outline-none"
        />
      </div>

      <div>
        <label for="lastName" class="block text-sm font-medium text-etiya-navy">
          {{ t().customers.create.demographic.lastName }}
          <span aria-hidden="true" class="text-rose-500">*</span>
        </label>
        <input
          id="lastName"
          type="text"
          [formField]="customerForm.lastName"
          aria-required="true"
          [placeholder]="t().customers.create.startsWith"
          class="mt-2 w-full rounded-lg border border-slate-200 bg-white px-3 py-2.5 text-sm text-etiya-navy placeholder:text-slate-400 focus:border-etiya-orange focus:ring-2 focus:ring-etiya-orange/30 focus:outline-none"
        />
      </div>

      <div>
        <label for="birthDate" class="block text-sm font-medium text-etiya-navy">
          {{ t().customers.create.demographic.birthDate }}
          <span aria-hidden="true" class="text-rose-500">*</span>
        </label>
        <input
          id="birthDate"
          type="date"
          [formField]="customerForm.birthDate"
          aria-required="true"
          class="mt-2 w-full rounded-lg border border-slate-200 bg-white px-3 py-2.5 text-sm text-etiya-navy placeholder:text-slate-400 focus:border-etiya-orange focus:ring-2 focus:ring-etiya-orange/30 focus:outline-none"
        />
      </div>

      <div>
        <label for="gender" class="block text-sm font-medium text-etiya-navy">
          {{ t().customers.create.demographic.gender }}
          <span aria-hidden="true" class="text-rose-500">*</span>
        </label>
        <select
          id="gender"
          [formField]="customerForm.gender"
          aria-required="true"
          class="mt-2 w-full rounded-lg border border-slate-200 bg-white px-3 py-2.5 text-sm text-etiya-navy focus:border-etiya-orange focus:ring-2 focus:ring-etiya-orange/30 focus:outline-none"
        >
          <option value="male">{{ t().customers.gender.male }}</option>
          <option value="female">{{ t().customers.gender.female }}</option>
        </select>
      </div>

      <div>
        <label for="fatherName" class="block text-sm font-medium text-etiya-navy">
          {{ t().customers.create.demographic.fatherName }}
        </label>
        <input
          id="fatherName"
          type="text"
          [formField]="customerForm.fatherName"
          class="mt-2 w-full rounded-lg border border-slate-200 bg-white px-3 py-2.5 text-sm text-etiya-navy placeholder:text-slate-400 focus:border-etiya-orange focus:ring-2 focus:ring-etiya-orange/30 focus:outline-none"
        />
      </div>

      <div>
        <label for="motherName" class="block text-sm font-medium text-etiya-navy">
          {{ t().customers.create.demographic.motherName }}
        </label>
        <input
          id="motherName"
          type="text"
          [formField]="customerForm.motherName"
          class="mt-2 w-full rounded-lg border border-slate-200 bg-white px-3 py-2.5 text-sm text-etiya-navy placeholder:text-slate-400 focus:border-etiya-orange focus:ring-2 focus:ring-etiya-orange/30 focus:outline-none"
        />
      </div>

      <div>
        <label for="identityNumber" class="block text-sm font-medium text-etiya-navy">
          {{ t().customers.create.demographic.identityNumber }}
          <span aria-hidden="true" class="text-rose-500">*</span>
        </label>
        <input
          id="identityNumber"
          type="text"
          inputmode="numeric"
          [formField]="customerForm.identityNumber"
          aria-required="true"
          class="mt-2 w-full rounded-lg border border-slate-200 bg-white px-3 py-2.5 text-sm text-etiya-navy placeholder:text-slate-400 focus:border-etiya-orange focus:ring-2 focus:ring-etiya-orange/30 focus:outline-none"
        />
      </div>
    </div>

    <div class="mt-8 flex items-center justify-between gap-3 border-t border-slate-100 pt-5">
      <a
        routerLink="/customers"
        class="rounded-lg border border-etiya-navy px-5 py-2.5 text-sm font-semibold text-etiya-navy transition hover:bg-etiya-gray focus:outline-none focus-visible:ring-2 focus-visible:ring-etiya-orange focus-visible:ring-offset-2"
      >
        {{ t().customers.create.cancel }}
      </a>

      <button
        type="button"
        [disabled]="customerForm().invalid()"
        class="flex items-center gap-2 rounded-lg px-5 py-2.5 text-sm font-semibold text-white transition focus:outline-none focus-visible:ring-2 focus-visible:ring-etiya-orange focus-visible:ring-offset-2 disabled:cursor-not-allowed disabled:bg-slate-300 disabled:text-white/80 enabled:bg-etiya-orange enabled:shadow-sm enabled:hover:bg-etiya-orange-dark"
      >
        {{ t().customers.create.next }}
        <svg class="h-4 w-4" viewBox="0 0 24 24" fill="none" aria-hidden="true">
          <path
            d="M5 12h14m-6-6 6 6-6 6"
            stroke="currentColor"
            stroke-width="1.8"
            stroke-linecap="round"
            stroke-linejoin="round"
          />
        </svg>
      </button>
    </div>
  </section>
</div>
