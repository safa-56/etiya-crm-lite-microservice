<div class="flex flex-col gap-5">
  <app-breadcrumb [items]="breadcrumb()" [label]="t().customers.create.breadcrumb" />

  <section class="rounded-2xl border border-slate-200 bg-white px-6 py-5 shadow-sm">
    <app-stepper [steps]="steps()" [active]="activeStep()" />
  </section>

  @switch (activeStep()) {
    @case (1) {
      <app-customer-demographic-form [initial]="demographic()" (next)="onDemographicNext($event)" />
    }
    @case (2) {
      <app-customer-address-step
        [(addresses)]="addresses"
        (back)="goToStep(1)"
        (next)="goToStep(3)"
      />
    }
    @case (3) {
      <app-customer-contact-step
        [(draft)]="contact"
        (back)="goToStep(2)"
        (create)="create()"
      />
    }
  }
</div>
