<div class="flex flex-col gap-5">
  <app-breadcrumb [items]="breadcrumb()" [label]="t().customers.create.breadcrumb" />

  <section class="rounded-2xl border border-slate-200 bg-white px-6 py-5 shadow-sm">
    <app-stepper [steps]="steps()" [active]="activeStep()" />
  </section>

  @switch (activeStep()) {
    @case (1) {
      <app-customer-demographic-form (next)="goToStep(2)" />
    }
  }
</div>
