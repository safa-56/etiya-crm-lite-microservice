<div class="min-h-dvh bg-etiya-gray">
  <!-- Sol menü -->
  <aside
    class="fixed inset-y-0 left-0 z-30 hidden w-60 flex-col bg-etiya-navy lg:flex"
    [attr.aria-label]="t().shell.mainNavigation"
  >
    <div class="flex h-16 shrink-0 items-center justify-center border-b border-white/10 px-6">
      <img
        ngSrc="etiya-logo.png"
        alt="Etiya"
        width="640"
        height="200"
        priority
        class="h-auto w-24"
      />
    </div>

    <nav class="flex-1 overflow-y-auto px-3 py-5">
      <ul class="flex flex-col gap-1">
        <li>
          <a
            routerLink="/customers"
            routerLinkActive="bg-white/10 text-white"
            [routerLinkActiveOptions]="{ exact: true }"
            #customersLink="routerLinkActive"
            class="group relative flex items-center gap-3 rounded-lg px-3 py-2.5 text-sm font-medium text-white/70 transition hover:bg-white/10 hover:text-white focus:outline-none focus-visible:ring-2 focus-visible:ring-etiya-orange focus-visible:ring-offset-2 focus-visible:ring-offset-etiya-navy"
            [attr.aria-current]="customersLink.isActive ? 'page' : null"
          >
            @if (customersLink.isActive) {
              <span
                aria-hidden="true"
                class="absolute inset-y-1.5 left-0 w-1 rounded-r bg-etiya-orange"
              ></span>
            }
            <svg class="h-4 w-4 shrink-0" viewBox="0 0 24 24" fill="none" aria-hidden="true">
              <circle cx="11" cy="11" r="6.5" stroke="currentColor" stroke-width="1.6" />
              <path
                d="m16 16 4.5 4.5"
                stroke="currentColor"
                stroke-width="1.6"
                stroke-linecap="round"
              />
            </svg>
            {{ t().nav.customerSearch }}
          </a>
        </li>

        <!-- Müşteri detayı yalnızca arama sonucundan açılır; menüde aktif durumu gösterilir. -->
        <li>
          <button
            type="button"
            [attr.aria-current]="pageKey() === 'customerDetail' ? 'page' : null"
            class="relative flex w-full items-center gap-3 rounded-lg px-3 py-2.5 text-left text-sm font-medium transition hover:bg-white/10 hover:text-white focus:outline-none focus-visible:ring-2 focus-visible:ring-etiya-orange focus-visible:ring-offset-2 focus-visible:ring-offset-etiya-navy"
            [class]="pageKey() === 'customerDetail' ? 'bg-white/10 text-white' : 'text-white/70'"
          >
            @if (pageKey() === 'customerDetail') {
              <span
                aria-hidden="true"
                class="absolute inset-y-1.5 left-0 w-1 rounded-r bg-etiya-orange"
              ></span>
            }
            <svg class="h-4 w-4 shrink-0" viewBox="0 0 24 24" fill="none" aria-hidden="true">
              <circle cx="12" cy="8" r="3.5" stroke="currentColor" stroke-width="1.6" />
              <path
                d="M5 19.5a7 7 0 0 1 14 0"
                stroke="currentColor"
                stroke-width="1.6"
                stroke-linecap="round"
              />
            </svg>
            {{ t().nav.customerInfo }}
          </button>
        </li>

        <li>
          <a
            routerLink="/customers/new"
            routerLinkActive="bg-white/10 text-white"
            #createLink="routerLinkActive"
            class="relative flex items-center gap-3 rounded-lg px-3 py-2.5 text-sm font-medium text-white/70 transition hover:bg-white/10 hover:text-white focus:outline-none focus-visible:ring-2 focus-visible:ring-etiya-orange focus-visible:ring-offset-2 focus-visible:ring-offset-etiya-navy"
            [attr.aria-current]="createLink.isActive ? 'page' : null"
          >
            @if (createLink.isActive) {
              <span
                aria-hidden="true"
                class="absolute inset-y-1.5 left-0 w-1 rounded-r bg-etiya-orange"
              ></span>
            }
            <svg class="h-4 w-4 shrink-0" viewBox="0 0 24 24" fill="none" aria-hidden="true">
              <circle cx="10" cy="8" r="3.5" stroke="currentColor" stroke-width="1.6" />
              <path
                d="M3.5 19.5a6.5 6.5 0 0 1 13 0M18 8.5v5M15.5 11h5"
                stroke="currentColor"
                stroke-width="1.6"
                stroke-linecap="round"
              />
            </svg>
            {{ t().nav.customerCreate }}
          </a>
        </li>

        <li>
          <button
            type="button"
            class="flex w-full items-center gap-3 rounded-lg px-3 py-2.5 text-left text-sm font-medium text-white/70 transition hover:bg-white/10 hover:text-white focus:outline-none focus-visible:ring-2 focus-visible:ring-etiya-orange focus-visible:ring-offset-2 focus-visible:ring-offset-etiya-navy"
          >
            <svg class="h-4 w-4 shrink-0" viewBox="0 0 24 24" fill="none" aria-hidden="true">
              <path
                d="M5 6h14v13a1 1 0 0 1-1 1H6a1 1 0 0 1-1-1V6ZM9 4h6v2H9V4Zm-.5 8h7m-7 4h4"
                stroke="currentColor"
                stroke-width="1.6"
                stroke-linecap="round"
              />
            </svg>
            {{ t().nav.orders }}
          </button>
        </li>

        <li>
          <button
            type="button"
            class="flex w-full items-center gap-3 rounded-lg px-3 py-2.5 text-left text-sm font-medium text-white/70 transition hover:bg-white/10 hover:text-white focus:outline-none focus-visible:ring-2 focus-visible:ring-etiya-orange focus-visible:ring-offset-2 focus-visible:ring-offset-etiya-navy"
          >
            <svg class="h-4 w-4 shrink-0" viewBox="0 0 24 24" fill="none" aria-hidden="true">
              <path
                d="M5 19V5m0 14h14M8.5 16V9.5m4 6.5v-10m4 10v-6"
                stroke="currentColor"
                stroke-width="1.6"
                stroke-linecap="round"
              />
            </svg>
            {{ t().nav.reports }}
          </button>
        </li>

        <li>
          <button
            type="button"
            class="flex w-full items-center gap-3 rounded-lg px-3 py-2.5 text-left text-sm font-medium text-white/70 transition hover:bg-white/10 hover:text-white focus:outline-none focus-visible:ring-2 focus-visible:ring-etiya-orange focus-visible:ring-offset-2 focus-visible:ring-offset-etiya-navy"
          >
            <svg class="h-4 w-4 shrink-0" viewBox="0 0 24 24" fill="none" aria-hidden="true">
              <circle cx="12" cy="12" r="3" stroke="currentColor" stroke-width="1.6" />
              <path
                d="M4.5 12a7.5 7.5 0 0 1 .3-2l-1.6-1.4 1.8-3.1 2 .8a7.5 7.5 0 0 1 1.7-1l.3-2.1h3.6l.3 2.1c.6.3 1.2.6 1.7 1l2-.8 1.8 3.1-1.6 1.4a7.5 7.5 0 0 1 0 4l1.6 1.4-1.8 3.1-2-.8c-.5.4-1.1.7-1.7 1l-.3 2.1h-3.6l-.3-2.1a7.5 7.5 0 0 1-1.7-1l-2 .8-1.8-3.1L4.8 14a7.5 7.5 0 0 1-.3-2Z"
                stroke="currentColor"
                stroke-width="1.4"
                stroke-linejoin="round"
              />
            </svg>
            {{ t().nav.settings }}
          </button>
        </li>

        <li>
          <a
            routerLink="/login"
            class="flex items-center gap-3 rounded-lg px-3 py-2.5 text-sm font-semibold text-etiya-orange transition hover:bg-white/10 focus:outline-none focus-visible:ring-2 focus-visible:ring-etiya-orange focus-visible:ring-offset-2 focus-visible:ring-offset-etiya-navy"
          >
            <svg class="h-4 w-4 shrink-0" viewBox="0 0 24 24" fill="none" aria-hidden="true">
              <path
                d="M14 8V6a1 1 0 0 0-1-1H6a1 1 0 0 0-1 1v12a1 1 0 0 0 1 1h7a1 1 0 0 0 1-1v-2m2-8 3 4-3 4m3-4H9"
                stroke="currentColor"
                stroke-width="1.6"
                stroke-linecap="round"
                stroke-linejoin="round"
              />
            </svg>
            {{ t().nav.logout }}
          </a>
        </li>
      </ul>
    </nav>

    <p class="shrink-0 border-t border-white/10 px-6 py-4 text-[11px] text-white/40">
      {{ t().shell.version }}
    </p>
  </aside>

  <!-- Sağ taraf: üst bar + sayfa içeriği -->
  <div class="flex min-h-dvh flex-col lg:pl-60">
    <header
      class="sticky top-0 z-20 flex flex-wrap items-center justify-between gap-4 border-b border-slate-200 bg-white px-6 py-3"
    >
      <div class="flex items-center gap-3">
        <img
          ngSrc="etiya-logo-2.png"
          alt="Etiya"
          width="910"
          height="223"
          class="h-auto w-16 lg:hidden"
        />
        <div>
          <h1 class="text-lg font-bold text-etiya-navy">{{ page().title }}</h1>
          <p class="text-xs text-slate-400">{{ page().subtitle }}</p>
        </div>
      </div>

      <div class="flex items-center gap-4">
        <app-language-switcher />

        <span aria-hidden="true" class="hidden h-8 w-px bg-slate-200 sm:block"></span>

        <button
          type="button"
          [attr.aria-label]="t().shell.userMenu"
          class="flex items-center gap-3 rounded-lg px-1.5 py-1 transition hover:bg-etiya-gray focus:outline-none focus-visible:ring-2 focus-visible:ring-etiya-orange focus-visible:ring-offset-2"
        >
          <span
            aria-hidden="true"
            class="flex h-9 w-9 items-center justify-center rounded-full bg-etiya-navy text-xs font-semibold text-white"
          >
            {{ user.initials }}
          </span>
          <span class="hidden text-left sm:block">
            <span class="block text-sm font-semibold text-etiya-navy">{{ user.name }}</span>
            <span class="block text-xs text-slate-400">{{ user.role }}</span>
          </span>
          <svg class="h-4 w-4 text-slate-400" viewBox="0 0 24 24" fill="none" aria-hidden="true">
            <path
              d="m6 9 6 6 6-6"
              stroke="currentColor"
              stroke-width="1.8"
              stroke-linecap="round"
              stroke-linejoin="round"
            />
          </svg>
        </button>
      </div>
    </header>

    <main class="flex-1 px-6 py-6">
      <router-outlet />
    </main>
  </div>
</div>
