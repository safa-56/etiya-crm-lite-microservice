# =============================================================================
# product-service - 'docker' profili (konteyner ortamı)
# Servis adları compose ağındaki host'lara işaret eder (crm-net).
# =============================================================================
spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST:postgres}:${DB_PORT:5432}/${DB_NAME:productdb}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
  jpa:
    hibernate:
      ddl-auto: update

  data:
    redis:
      host: ${REDIS_HOST:redis}
      port: ${REDIS_PORT:6379}

  # Konteyner ağında Kafka'ya iç listener üzerinden bağlan
  cloud:
    stream:
      kafka:
        binder:
          brokers: ${KAFKA_BROKERS:kafka:29092}

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL:http://eureka-server:8761/eureka/}

---
# Docker ağında Keycloak servis adıyla (keycloak:8080) erişilir; token issuer'ı
# bu adresle eşleşmelidir (KC_HOSTNAME_STRICT=false ile issuer istekten türetilir).
spring:
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_ISSUER_URI:http://keycloak:8080/realms/etiya-crm}
