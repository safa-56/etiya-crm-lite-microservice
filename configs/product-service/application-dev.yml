# =============================================================================
# product-service - 'dev' profili (yerel geliştirme)
# Altyapı infra/docker-compose.yml ile localhost üzerinde çalışır.
# =============================================================================
spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:productdb}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
  jpa:
    hibernate:
      # Geliştirmede şemayı otomatik güncelle (outbox/inbox/projection tabloları dahil).
      ddl-auto: update
    show-sql: true

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL:http://localhost:8761/eureka/}

logging:
  level:
    com.etiya.productservice: DEBUG
    org.hibernate.SQL: DEBUG
