# =============================================================================
# bff-service - ORTAK (profil bağımsız) konfigürasyon
# Merkezi config server üzerinden sunulur (configs/bff-service/).
# BFF durumsuzdur: DB/Redis/Kafka yoktur; yalnızca downstream servisleri çağırır.
# =============================================================================
server:
  port: ${SERVER_PORT:8099}

eureka:
  instance:
    prefer-ip-address: true
  client:
    register-with-eureka: true
    fetch-registry: true
    # Registry'yi daha sık çek: bir downstream yeniden başladığında (veya eski instance
    # düştüğünde) BFF'in güncel instance listesini alması ~30sn yerine ~5sn'ye iner.
    # Böylece "detay bazen açılmıyor" penceresi kısalır.
    registry-fetch-interval-seconds: 5

# Spring Cloud LoadBalancer, Eureka'dan aldığı instance listesini önbelleğe alır (varsayılan
# 35sn). Yeniden başlatma sonrası eski/ölü instance'ın seçilme penceresini kısaltmak için
# TTL düşürülür; aggregator'daki yeniden deneme ile birlikte aralıklı bağlantı hataları giderilir.
spring:
  cloud:
    loadbalancer:
      cache:
        ttl: 5s

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true

---
# =============================================================================
# Güvenlik - OAuth2 Resource Server (JWT). Keycloak 'etiya-crm' realm issuer'ı.
# Host (dev) varsayılanıdır; 'docker' profilinde issuer keycloak:8080 ile override edilir.
# =============================================================================
spring:
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_ISSUER_URI:http://localhost:8180/realms/etiya-crm}
