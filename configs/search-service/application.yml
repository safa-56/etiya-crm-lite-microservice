# =============================================================================
# search-service - ORTAK (profil bağımsız) konfigürasyon
# Merkezi config server üzerinden sunulur (configs/search-service/).
# Ortama özel (host/port/şifre) ayarlar dev/docker/prod profillerinde override edilir.
# =============================================================================
server:
  port: ${SERVER_PORT:8087}

spring:
  jpa:
    hibernate:
      # Şema yönetimi ortama göre override edilir (dev: update, prod: validate).
      ddl-auto: validate
    # Lazy-loading kaynaklı beklenmedik sorguları önlemek için view'da session açma.
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

  # --- Redis (cacheleme) ---
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      timeout: 2000ms

  cache:
    type: redis
    redis:
      # Cache girişleri için varsayılan TTL (RedisCacheConfig ile de yönetilir).
      time-to-live: 120000
      cache-null-values: false

  # --- Kafka (Spring Cloud Stream + Kafka binder) ---
  # search-service YALNIZCA tüketicidir; customer ve account olay akışlarını dinler.
  # Broker adresi ortama göre override edilir.
  cloud:
    # Birden fazla fonksiyonel binding olduğunda Spring Cloud Stream'in hepsini
    # bind etmesi için tanımlar açıkça listelenmelidir (";" ile ayrılır).
    function:
      definition: customerEventConsumer;billingAccountEventConsumer
    stream:
      kafka:
        binder:
          brokers: ${KAFKA_BROKERS:localhost:9092}
      bindings:
        # CustomerEventConsumerConfig#customerEventConsumer -> "customerEventConsumer-in-0"
        # Müşteri olayları (CustomerCreated/Updated/Deleted) ile arama indeksi upsert/remove.
        customerEventConsumer-in-0:
          destination: ${APP_CUSTOMER_TOPIC:crm.Customer.events}
          group: search-service
        # BillingAccountEventConsumerConfig#billingAccountEventConsumer -> "-in-0"
        # Fatura hesabı olayları (Activated/Updated/Cancelled/Deleted) ile
        # account/order numaraları eklenir/çıkarılır.
        billingAccountEventConsumer-in-0:
          destination: ${APP_ACCOUNT_TOPIC:crm.Account.events}
          group: search-service

# Uygulamaya özel ayarlar
app:
  kafka:
    # Kafka consumer'larını aç/kapa (test profilinde false yapılır)
    enabled: true

eureka:
  instance:
    prefer-ip-address: true
  client:
    register-with-eureka: true
    fetch-registry: true

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true

springdoc:
  swagger-ui:
    path: /swagger-ui.html
