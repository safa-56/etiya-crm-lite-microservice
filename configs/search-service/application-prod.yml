# =============================================================================
# search-service - 'prod' profili (üretim)
# Tüm hassas değerler ortam değişkenleri ile dışarıdan verilir (default yok).
# =============================================================================
spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST}:${DB_PORT:5432}/${DB_NAME}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
  jpa:
    hibernate:
      # Üretimde şema migration'ları (Flyway/Liquibase veya DBA) yönetir; sadece doğrula.
      ddl-auto: validate
    show-sql: false

  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}

  cloud:
    stream:
      kafka:
        binder:
          brokers: ${KAFKA_BROKERS}

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL}

logging:
  level:
    com.etiya.searchservice: INFO
    root: WARN
