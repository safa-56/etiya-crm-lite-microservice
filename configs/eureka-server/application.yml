# =============================================================================
# eureka-server - ORTAK (profil bağımsız) konfigürasyon
# Merkezi config server üzerinden sunulur (configs/eureka-server/).
# Servisin yereldeki application.yml'i yalnızca bootstrap (isim, aktif profil,
# config server importu) bilgisini tutar; asıl ayarlar burada yaşar.
# =============================================================================
server:
  # Eureka sunucusunun standart portu (gerekirse SERVER_PORT ile override edilir)
  port: ${SERVER_PORT:8761}

eureka:
  instance:
    # Konteyner ortamında hostname yerine IP kullanmak kayıt/keşifte daha güvenilirdir
    prefer-ip-address: true
  client:
    # Bu uygulama registry'nin KENDİSİ olduğu için (standalone) kendini bir
    # client'a kayıt etmez ve registry'yi çekmez. Yüksek erişilebilirlik (HA)
    # için birden fazla peer kullanılacaksa bu iki değer prod profilinde true
    # yapılıp defaultZone peer URL'leri ile doldurulmalıdır.
    register-with-eureka: false
    fetch-registry: false

management:
  endpoints:
    web:
      exposure:
        # Health probe'ları için actuator health endpoint'i açık
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true
