# =============================================================================
# account-service - ORTAK (profil bağımsız) konfigürasyon
# Merkezi config server üzerinden sunulur (configs/account-service/).
# Ortama özel (host/port/şifre) ayarlar dev/docker/prod profillerinde override edilir.
# =============================================================================
server:
  port: ${SERVER_PORT:8082}

spring:
  jpa:
    hibernate:
      # Şema yönetimi ortama göre override edilir (dev: update, prod: validate).
      ddl-auto: validate
    # Lazy-loading kaynaklı beklenmedik sorguları önlemek için view'da session açma.
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

  # --- Redis (cacheleme) ---
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      timeout: 2000ms

  cache:
    type: redis
    redis:
      # Cache girişleri için varsayılan TTL (RedisCacheConfig ile de yönetilir).
      time-to-live: 600000
      cache-null-values: false

  # --- Kafka (Spring Cloud Stream + Kafka binder) ---
  # Producer tarafı Outbox + Debezium ile yürüdüğünden burada tüketici (product
  # olayları) binding'i tanımlıdır. Broker adresi ortama göre override edilir.
  cloud:
    stream:
      kafka:
        binder:
          brokers: ${KAFKA_BROKERS:localhost:9092}
      bindings:
        # ProductEventConsumerConfig#productEventConsumer -> "productEventConsumer-in-0"
        productEventConsumer-in-0:
          destination: ${APP_PRODUCT_TOPIC:crm.Product.events}
          group: account-service

# Uygulamaya özel ayarlar
app:
  kafka:
    # Kafka consumer'larını aç/kapa (test profilinde false yapılır)
    enabled: true
  outbox:
    # Debezium EventRouter'ın route.by.field olarak kullandığı aggregate tipi
    account-aggregate-type: Account

eureka:
  instance:
    prefer-ip-address: true
  client:
    register-with-eureka: true
    fetch-registry: true

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true

springdoc:
  swagger-ui:
    path: /swagger-ui.html
