# =============================================================================
# gateway-server - ORTAK (profil bağımsız) konfigürasyon
# Merkezi config server üzerinden sunulur (configs/gateway-server/).
# Servisin yereldeki application.yml'i yalnızca bootstrap (isim, aktif profil,
# config server importu) bilgisini tutar; asıl ayarlar burada yaşar.
# =============================================================================
spring:
  cloud:
    gateway:
      # Reaktif (WebFlux) sunucu tarafı gateway ayarları
      server:
        webflux:
          discovery:
            locator:
              # Eureka'ya kayıtlı servisler için otomatik route üretir:
              #   http://gateway:8080/CUSTOMER-SERVICE/**  ->  lb://CUSTOMER-SERVICE
              # Servis id'lerini büyük/küçük harf duyarsız eşlemek için lower-case.
              # Üretimde açık (explicit) route tanımları tercih edilir (bkz. prod profili).
              enabled: true
              lower-case-service-id: true

          # -----------------------------------------------------------------
          # Açık (explicit) route tanımları — projenin ANA GİRİŞİ burasıdır.
          # Her servis '/<servis-adı>/**' önekiyle dışarı açılır; StripPrefix=1
          # ile önek atılıp istek downstream servise (lb://<servis-adı>) iletilir.
          #   Dış:  http://localhost:8080/customer-service/api/v1/individual-customers
          #   İç :  lb://customer-service   -> /api/v1/individual-customers
          #
          # Yeni bir servis eklerken bu listeye aynı kalıpta bir route ekleyin
          # (id + Path predicate + StripPrefix filtresi). Bu route'lar tüm
          # profillerde (prod dahil) geçerlidir; keşif tabanlı locator'a bağlı
          # değildir.
          # -----------------------------------------------------------------
          # Dış istek '/<servis-adı>/**' önekiyle gelir; StripPrefix=1 öneki atar ve
          # kalan yolu downstream servise iletir:
          #   Dış:  http://localhost:8080/customer-service/api/v1/individual-customers
          #   İç :  lb://customer-service -> /api/v1/individual-customers
          # (Bu, discovery.locator ile aynı konvansiyondur; prod'da locator kapalıyken de
          #  aynı deseni açıkça garanti eder.)
          routes:
            - id: customer-service
              uri: lb://customer-service
              predicates:
                - Path=/customer-service/**
              filters:
                - StripPrefix=1

            - id: account-service
              uri: lb://account-service
              predicates:
                - Path=/account-service/**
              filters:
                - StripPrefix=1

            - id: product-service
              uri: lb://product-service
              predicates:
                - Path=/product-service/**
              filters:
                - StripPrefix=1

            - id: cart-service
              uri: lb://cart-service
              predicates:
                - Path=/cart-service/**
              filters:
                - StripPrefix=1

            - id: order-service
              uri: lb://order-service
              predicates:
                - Path=/order-service/**
              filters:
                - StripPrefix=1

            - id: search-service
              uri: lb://search-service
              predicates:
                - Path=/search-service/**
              filters:
                - StripPrefix=1

            - id: bff-service
              uri: lb://bff-service
              predicates:
                - Path=/bff-service/**
              filters:
                - StripPrefix=1

  # ---------------------------------------------------------------------------
  # Güvenlik - OAuth2 Resource Server (JWT doğrulama)
  # Gateway, Keycloak'ın 'etiya-crm' realm'inde ürettiği access token'ları burada
  # doğrular. issuer-uri, JWKS ve token issuer'ını otomatik keşfetmek için
  # kullanılır. Ortam bazında (dev host / docker) KEYCLOAK_ISSUER_URI ile override
  # edilir; varsayılan yerel geliştirme (host) adresidir.
  #   - Host (dev)   : http://localhost:8180/realms/etiya-crm
  #   - Docker ağı   : http://keycloak:8080/realms/etiya-crm  (bkz. application-docker.yml)
  # ---------------------------------------------------------------------------
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_ISSUER_URI:http://localhost:8180/realms/etiya-crm}

server:
  # API Gateway'in dış dünyaya açıldığı standart port (SERVER_PORT ile override)
  port: ${SERVER_PORT:8080}

eureka:
  instance:
    # Konteyner ortamında hostname yerine IP kullanmak kayıt/keşifte daha güvenilirdir
    prefer-ip-address: true
  client:
    # Gateway bir client'tır: kendini registry'ye kaydeder ve registry'yi çeker.
    register-with-eureka: true
    fetch-registry: true

management:
  endpoints:
    web:
      exposure:
        # Health probe'ları ve gateway route teşhisi için ilgili endpoint'ler açık
        include: health,info,gateway
  endpoint:
    health:
      probes:
        enabled: true
