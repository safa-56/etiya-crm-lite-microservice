# =============================================================================
# gateway-server - ORTAK (profil bağımsız) konfigürasyon
# Merkezi config server üzerinden sunulur (configs/gateway-server/).
# Servisin yereldeki application.yml'i yalnızca bootstrap (isim, aktif profil,
# config server importu) bilgisini tutar; asıl ayarlar burada yaşar.
# =============================================================================
spring:
  cloud:
    gateway:
      # Reaktif (WebFlux) sunucu tarafı gateway ayarları
      server:
        webflux:
          discovery:
            locator:
              # Eureka'ya kayıtlı servisler için otomatik route üretir:
              #   http://gateway:8080/CUSTOMER-SERVICE/**  ->  lb://CUSTOMER-SERVICE
              # Servis id'lerini büyük/küçük harf duyarsız eşlemek için lower-case.
              # Üretimde açık (explicit) route tanımları tercih edilir (bkz. prod profili).
              enabled: true
              lower-case-service-id: true

          # -----------------------------------------------------------------
          # Açık (explicit) route tanımları — projenin ANA GİRİŞİ burasıdır.
          # Her servis '/<servis-adı>/**' önekiyle dışarı açılır; StripPrefix=1
          # ile önek atılıp istek downstream servise (lb://<servis-adı>) iletilir.
          #   Dış:  http://localhost:8080/customer-service/api/v1/individual-customers
          #   İç :  lb://customer-service   -> /api/v1/individual-customers
          #
          # Yeni bir servis eklerken bu listeye aynı kalıpta bir route ekleyin
          # (id + Path predicate + StripPrefix filtresi). Bu route'lar tüm
          # profillerde (prod dahil) geçerlidir; keşif tabanlı locator'a bağlı
          # değildir.
          # -----------------------------------------------------------------
          routes:
            - id: customer-service
              uri: lb://customer-service
              predicates:
                - Path=/api/v1/individual-customers/**
                - Path=/api/v1/addresses/**
                - Path=/api/v1/contact-infos/**
              filters:
                - StripPrefix=1

            - id: account-service
              uri: lb://account-service
              predicates:
                - Path=/api/v1/billing-accounts/**
              filters:
                - StripPrefix=1

            - id: product-service
              uri: lb://product-service
              predicates:
                - Path=/api/v1/product-specs/**
                - Path=/api/v1/product-offers/**
                - Path=/api/v1/catalogs/**
                - Path=/api/v1/campaigns/**
                - Path=/api/v1/products/**
              filters:
                - StripPrefix=1

server:
  # API Gateway'in dış dünyaya açıldığı standart port (SERVER_PORT ile override)
  port: ${SERVER_PORT:8080}

eureka:
  instance:
    # Konteyner ortamında hostname yerine IP kullanmak kayıt/keşifte daha güvenilirdir
    prefer-ip-address: true
  client:
    # Gateway bir client'tır: kendini registry'ye kaydeder ve registry'yi çeker.
    register-with-eureka: true
    fetch-registry: true

management:
  endpoints:
    web:
      exposure:
        # Health probe'ları ve gateway route teşhisi için ilgili endpoint'ler açık
        include: health,info,gateway
  endpoint:
    health:
      probes:
        enabled: true
