eureka:
  client:
    service-url:
      defaultZone: http://eureka-server:8761/eureka/

# Docker ağı içinde Keycloak, servis adıyla (keycloak:8080) erişilir.
# Token issuer'ının bu adresle eşleşmesi için Keycloak'a da aynı hostname üzerinden
# istek yapılmalıdır (KC_HOSTNAME_STRICT=false ile issuer istek adresinden türetilir).
spring:
  security:
    oauth2:
      resourceserver:
        jwt:
          # iss doğrulaması: token'ı host'tan (Postman/tarayıcı) alanlar için
          # issuer localhost:8180'dir. jwk-set-uri ise imza anahtarını Docker
          # ağından (keycloak:8080) çeker. Böylece host'ta üretilen token,
          # Docker'daki servislerce doğrulanabilir.
          issuer-uri: ${KEYCLOAK_ISSUER_URI:http://localhost:8180/realms/etiya-crm}
          jwk-set-uri: ${KEYCLOAK_JWK_SET_URI:http://keycloak:8080/realms/etiya-crm/protocol/openid-connect/certs}
