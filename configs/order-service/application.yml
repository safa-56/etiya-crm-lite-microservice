# =============================================================================
# order-service - ORTAK (profil bağımsız) konfigürasyon
# Merkezi config server üzerinden sunulur (configs/order-service/).
# Ortama özel (host/port/şifre) ayarlar dev/docker/prod profillerinde override edilir.
# =============================================================================
server:
  port: ${SERVER_PORT:8086}

spring:
  jpa:
    hibernate:
      # Şema yönetimi ortama göre override edilir (dev: update, prod: validate).
      ddl-auto: validate
    # Lazy-loading kaynaklı beklenmedik sorguları önlemek için view'da session açma.
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

  # --- Redis (cacheleme) ---
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      timeout: 2000ms

  cache:
    type: redis
    redis:
      # Cache girişleri için varsayılan TTL (RedisCacheConfig ile de yönetilir).
      time-to-live: 600000
      cache-null-values: false

  # --- Kafka (Spring Cloud Stream + Kafka binder) ---
  # Producer tarafı Outbox + Debezium ile yürür. order-service, sepetten siparişe
  # geçiş Saga'sının başlatıcısıdır: sepet doğrulama isteğini yayınlar ve cart-service'in
  # sonuç olaylarını bu tüketici ile dinler (crm.OrderCheckoutSaga.events).
  cloud:
    function:
      definition: orderCheckoutConsumer
    stream:
      kafka:
        binder:
          brokers: ${KAFKA_BROKERS:localhost:9092}
      bindings:
        # OrderCheckoutSagaConsumerConfig#orderCheckoutConsumer -> "orderCheckoutConsumer-in-0"
        # Sepetten siparişe geçiş Saga'sının doğrulama SONUÇ olayları (cart-service'ten).
        orderCheckoutConsumer-in-0:
          destination: ${APP_SAGA_TOPIC:crm.OrderCheckoutSaga.events}
          group: order-service

# Uygulamaya özel ayarlar
app:
  kafka:
    # Kafka consumer'larını aç/kapa (test profilinde false yapılır)
    enabled: true

eureka:
  instance:
    prefer-ip-address: true
  client:
    register-with-eureka: true
    fetch-registry: true

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true

springdoc:
  swagger-ui:
    path: /swagger-ui.html

---
# =============================================================================
# Güvenlik - OAuth2 Resource Server (JWT). Keycloak 'etiya-crm' realm issuer'ı.
# Bu ayrı YAML belgesi (---) mevcut ayarlarla birleşir. Host (dev) varsayılanıdır;
# 'docker' profilinde application-docker.yml issuer'ı keycloak:8080 ile override eder.
# =============================================================================
spring:
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_ISSUER_URI:http://localhost:8180/realms/etiya-crm}
