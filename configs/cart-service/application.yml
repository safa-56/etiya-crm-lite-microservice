# =============================================================================
# cart-service - ORTAK (profil bağımsız) konfigürasyon
# Merkezi config server üzerinden sunulur (configs/cart-service/).
# Ortama özel (host/port/şifre) ayarlar dev/docker/prod profillerinde override edilir.
# =============================================================================
server:
  port: ${SERVER_PORT:8085}

spring:
  jpa:
    hibernate:
      # Şema yönetimi ortama göre override edilir (dev: update, prod: validate).
      ddl-auto: validate
    # Lazy-loading kaynaklı beklenmedik sorguları önlemek için view'da session açma.
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

  # --- Redis (cacheleme) ---
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      timeout: 2000ms

  cache:
    type: redis
    redis:
      # Cache girişleri için varsayılan TTL (RedisCacheConfig ile de yönetilir).
      time-to-live: 600000
      cache-null-values: false

  # --- Kafka (Spring Cloud Stream + Kafka binder) ---
  # Producer tarafı Outbox + Debezium ile yürür. cart-service, sepete ekleme Saga'sının
  # başlatıcısıdır: doğrulama isteğini yayınlar ve product-service'in sonuç olaylarını
  # bu tüketici ile dinler (crm.CartSaga.events).
  cloud:
    function:
      # İki tüketici: (1) sepete ekleme saga'sının SONUÇ tüketicisi (başlatıcı rol),
      # (2) sepetten siparişe geçiş saga'sının İSTEK tüketicisi (doğrulayıcı rol).
      definition: cartSagaConsumer;orderCheckoutRequestConsumer
    stream:
      kafka:
        binder:
          brokers: ${KAFKA_BROKERS:localhost:9092}
      bindings:
        # CartSagaConsumerConfig#cartSagaConsumer -> "cartSagaConsumer-in-0"
        # Sepet ekleme Saga'sının doğrulama SONUÇ olayları (product-service'ten).
        cartSagaConsumer-in-0:
          destination: ${APP_SAGA_TOPIC:crm.CartSaga.events}
          group: cart-service
        # OrderCheckoutSagaConsumerConfig#orderCheckoutRequestConsumer -> "orderCheckoutRequestConsumer-in-0"
        # Sepetten siparişe geçiş Saga'sının doğrulama İSTEK olayları (order-service'ten).
        # cart-service bu saga'da doğrulayıcıdır: sepeti kontrol edip sonucu geri yayınlar.
        orderCheckoutRequestConsumer-in-0:
          destination: ${APP_ORDER_SAGA_TOPIC:crm.OrderCheckoutSaga.events}
          group: cart-service

# Uygulamaya özel ayarlar
app:
  kafka:
    # Kafka consumer'larını aç/kapa (test profilinde false yapılır)
    enabled: true

eureka:
  instance:
    prefer-ip-address: true
  client:
    register-with-eureka: true
    fetch-registry: true

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true

springdoc:
  swagger-ui:
    path: /swagger-ui.html

---
# =============================================================================
# Güvenlik - OAuth2 Resource Server (JWT). Keycloak 'etiya-crm' realm issuer'ı.
# Bu ayrı YAML belgesi (---) mevcut ayarlarla birleşir. Host (dev) varsayılanıdır;
# 'docker' profilinde application-docker.yml issuer'ı keycloak:8080 ile override eder.
# =============================================================================
spring:
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_ISSUER_URI:http://localhost:8180/realms/etiya-crm}
