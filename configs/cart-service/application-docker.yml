# =============================================================================
# cart-service - 'docker' profili (konteyner ortamı)
# Servis adları compose ağındaki host'lara işaret eder (crm-net).
# =============================================================================
spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST:postgres}:${DB_PORT:5432}/${DB_NAME:cartdb}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
  jpa:
    hibernate:
      ddl-auto: update
    # Hibernate şema kurulumu bitmeden data.sql çalışmasın (seed FK/tabloları bulsun).
    defer-datasource-initialization: true

  # Otomatik test seed'i: Hibernate şemayı kurduktan SONRA classpath'teki data.sql
  # çalışır ve DB'yi idempotent (ON CONFLICT DO NOTHING) tohumlar. Böylece
  # docker-compose.yml ile konteyner olarak çalıştıran ekipte de veri otomatik gelir.
  sql:
    init:
      mode: always
      # Docker ortamı boş veriyle başlar: varsayılan data.sql (dev tam seed dosyası)
      # yerine, yalnızca referans satırlarını tohumlayan betik okunur.
      # İş verisi API üzerinden oluşturulur. Bkz. src/main/resources/data-reference.sql
      data-locations: classpath:data-reference.sql

  data:
    redis:
      host: ${REDIS_HOST:redis}
      port: ${REDIS_PORT:6379}

  # Konteyner ağında Kafka'ya iç listener üzerinden bağlan
  cloud:
    stream:
      kafka:
        binder:
          brokers: ${KAFKA_BROKERS:kafka:29092}

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL:http://eureka-server:8761/eureka/}

---
# Docker ağında Keycloak servis adıyla (keycloak:8080) erişilir; token issuer'ı
# bu adresle eşleşmelidir (KC_HOSTNAME_STRICT=false ile issuer istekten türetilir).
spring:
  security:
    oauth2:
      resourceserver:
        jwt:
          # iss doğrulaması: token'ı host'tan (Postman/tarayıcı) alanlar için
          # issuer localhost:8180'dir. jwk-set-uri ise imza anahtarını Docker
          # ağından (keycloak:8080) çeker. Böylece host'ta üretilen token,
          # Docker'daki servislerce doğrulanabilir.
          issuer-uri: ${KEYCLOAK_ISSUER_URI:http://localhost:8180/realms/etiya-crm}
          jwk-set-uri: ${KEYCLOAK_JWK_SET_URI:http://keycloak:8080/realms/etiya-crm/protocol/openid-connect/certs}
