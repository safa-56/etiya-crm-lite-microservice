# =============================================================================
# Etiya CRM Lite - login ekrani ozel hata mesajlari
# -----------------------------------------------------------------------------
# Base 'keycloak' temasinin mesaj anahtarlarini override eder. i18n kapali
# oldugu icin login sayfasi varsayilan (en) locale ile render edilir; bu dosya
# o mesajlari degistirir.
#
# Karsiladigi kabul kriterleri:
#   - Kullanici adi veya sifre hatali oldugunda gosterilen mesaj.
#   - Hesap art arda 5 basarisiz denemeyle (brute-force) gecici kilitlendiginde
#     gosterilen mesaj. Keycloak bu durumda 'accountTemporarilyDisabledMessage'
#     anahtarini kullanir.
#
# NOT: 'accountTemporarilyDisabledMessage' metni degistirilirse, Login butonunu
#      pasiflestiren js/login-messages.js icindeki LOCKED_MESSAGE sabiti de
#      birebir ayni sekilde guncellenmelidir.
# =============================================================================

invalidUserMessage=Wrong user name or password. Please try again.
accountTemporarilyDisabledMessage=Your account has been locked. Please try again after 15 minutes.
