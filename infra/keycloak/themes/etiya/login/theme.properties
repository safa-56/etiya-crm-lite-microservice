# =============================================================================
# Etiya CRM Lite - ozel login temasi
# -----------------------------------------------------------------------------
# Standart Keycloak login temasini genisletir; yalnizca alan kisitlarini ekler:
#   - AC-1: kullanici adi alani <= 50 karakter (maxlength ile fazla giris engellenir)
#   - AC-4: sifre alani <= 50 karakter (maxlength ile fazla giris engellenir)
#   - AC-2: kullanici adinin bas/son bosluklari gonderimde otomatik kirpilir
# Bu kisitlar 'js/field-limits.js' icinde uygulanir (asagidaki 'scripts' anahtari).
# =============================================================================
parent=keycloak
import=common/keycloak

# Keycloak, login sayfalarina bu JS dosyalarini otomatik enjekte eder.
scripts=js/field-limits.js
