# =============================================================================
# Etiya CRM Lite - ozel login temasi
# -----------------------------------------------------------------------------
# Standart Keycloak login temasini genisletir. Eklenen kabul kriterleri:
#   - AC-1: kullanici adi alani <= 50 karakter (maxlength ile fazla giris engellenir)
#   - AC-4: sifre alani <= 50 karakter (maxlength ile fazla giris engellenir)
#   - AC-2: kullanici adinin bas/son bosluklari gonderimde otomatik kirpilir
#     Yukaridakiler 'js/field-limits.js' icinde uygulanir.
#   - Hatali kullanici adi/sifre ve hesap kilidi hata mesajlari
#     (metinler: messages/messages_en.properties; davranis: js/login-messages.js)
# =============================================================================
parent=keycloak
import=common/keycloak

# Keycloak, login sayfalarina bu JS dosyalarini otomatik (sirayla) enjekte eder.
scripts=js/field-limits.js js/login-messages.js
