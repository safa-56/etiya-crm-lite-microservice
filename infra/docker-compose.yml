volumes:
  postgres-data:
  redis-data:
  redisinsight-data:
  kafka-data:

# -----------------------------------------------------------------------------
# Ortak ağ - tüm altyapı ve uygulama servisleri bu ağ üzerinden servis adıyla
# (ör. config-server:8888, postgres:5432, kafka:29092) haberleşir.
# -----------------------------------------------------------------------------
networks:
  crm-net:
    driver: bridge
    name: crm-net
